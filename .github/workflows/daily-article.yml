name: Daily Article Generation

on:
  schedule:
    - cron: '0 23 * * *'   # JST 8:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      GOOGLE_GSC_CREDENTIALS: gsc_credentials.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic openai requests python-dotenv google-api-python-client google-auth

      - name: Create GSC credentials
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
        run: python3 -c "import os; open('gsc_credentials.json','w').write(os.environ['GSC_CREDENTIALS_JSON'])"

      - name: Run GSC analysis
        run: python analyze_gsc.py

      - name: Generate article
        run: python generate_article.py
