name: Weekly Tasks

on:
  schedule:
    - cron: '0 0 * * 1'    # JST 9:00 月曜 — 目的地記事
    - cron: '30 23 * * 1'  # JST 8:30 月曜 — 競合分析
  workflow_dispatch:

jobs:
  destination:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic openai requests python-dotenv

      - name: Generate destination article
        run: python generate_destination.py

      - name: Commit pending article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add pending_articles/ destination_state.json
          git diff --staged --quiet || git commit -m "Add pending destination article $(date -u +%Y-%m-%d)"
          git push

  competitor-analysis:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 23 * * 1' || github.event_name == 'workflow_dispatch'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      GOOGLE_GSC_CREDENTIALS: gsc_credentials.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv google-api-python-client google-auth

      - name: Create GSC credentials
        env:
          GSC_CREDENTIALS_B64: ${{ secrets.GSC_CREDENTIALS_B64 }}
        run: python3 -c "import base64,os; open('gsc_credentials.json','wb').write(base64.b64decode(os.environ['GSC_CREDENTIALS_B64'].strip()))"

      - name: Run GSC analysis
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_GSC_CREDENTIALS: gsc_credentials.json
        run: python analyze_gsc.py

      - name: Run competitor analysis
        run: python analyze_competitors.py --from-gsc
